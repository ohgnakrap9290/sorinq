<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="qqq" />
    <meta name="description" content="Random interview question timer." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>qqq</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --surface: #0d0d0d;
        --surface-2: #151515;
        --text: #f7f7f7;
        --muted: #a6a6a6;
        --soft: #737373;
        --line: #2c2c2c;
        --line-strong: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.08), transparent 34rem),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100svh;
        padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      }

      button,
      input {
        font: inherit;
      }

      button {
        min-height: 52px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--text);
        color: #050505;
        font-weight: 850;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      button.secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--line);
      }

      button:active {
        transform: translateY(1px);
      }

      input {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #080808;
        color: var(--text);
        padding: 0 16px;
        font-size: 24px;
        font-weight: 850;
        font-variant-numeric: tabular-nums;
      }

      label {
        display: grid;
        gap: 9px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .app {
        width: min(100%, 560px);
        min-height: calc(100svh - 36px);
        margin: 0 auto;
        display: grid;
      }

      .screen {
        min-height: calc(100svh - 36px);
        display: none;
      }

      .screen.active {
        display: grid;
      }

      .home {
        align-content: center;
        gap: 22px;
      }

      .home-top {
        display: grid;
        gap: 16px;
      }

      .logo {
        width: 64px;
        height: 64px;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 24px;
        font-weight: 950;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(54px, 18vw, 92px);
        line-height: 0.9;
        font-weight: 950;
      }

      .tagline {
        color: var(--muted);
        font-size: 17px;
        line-height: 1.45;
        max-width: 28rem;
      }

      .home-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #101010;
        padding: 18px;
        display: grid;
        gap: 16px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      .quick-times {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .quick-times button {
        min-height: 42px;
        font-size: 14px;
      }

      .quick-times button.selected {
        background: var(--text);
        color: #050505;
        border-color: var(--text);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat {
        min-height: 76px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #080808;
        padding: 12px;
        display: grid;
        align-content: space-between;
      }

      .stat span {
        color: var(--soft);
        font-size: 11px;
        font-weight: 750;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .stat strong {
        font-size: 20px;
        line-height: 1;
      }

      .practice {
        grid-template-rows: auto 1fr auto;
        gap: 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 9px;
        display: grid;
        place-items: center;
        font-weight: 950;
        flex: 0 0 auto;
      }

      h2 {
        font-size: 18px;
        line-height: 1.1;
        font-weight: 850;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      main {
        display: grid;
        align-content: center;
        gap: 14px;
      }

      .question-panel {
        min-height: 330px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 36%),
          var(--surface);
        padding: 22px;
        display: grid;
        align-content: space-between;
        gap: 28px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      .question-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .question {
        font-size: clamp(27px, 8vw, 43px);
        line-height: 1.06;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .timer-panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface-2);
        padding: 16px;
        display: grid;
        gap: 15px;
      }

      .timer-top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
      }

      .time {
        font-variant-numeric: tabular-nums;
        font-size: clamp(46px, 14vw, 68px);
        line-height: 0.92;
        font-weight: 950;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        text-align: right;
        padding-bottom: 6px;
      }

      .status.done {
        color: var(--text);
      }

      .progress {
        height: 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        background: #070707;
      }

      .bar {
        width: 0%;
        height: 100%;
        background: var(--text);
        border-radius: inherit;
        transition: width 180ms linear;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 380px) {
        body {
          padding-left: 12px;
          padding-right: 12px;
        }

        .question-panel {
          min-height: 300px;
          padding: 18px;
        }

        .question {
          font-size: 25px;
        }

        .quick-times {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="screen home active" id="homeScreen">
        <div class="home-top">
          <div class="logo" aria-hidden="true">q</div>
          <div>
            <h1>qqq</h1>
            <p class="tagline">Set your answer time, start practice, then move through random questions at your own pace.</p>
          </div>
        </div>

        <div class="home-card">
          <label>
            Answer time in seconds
            <input id="seconds" type="number" min="5" max="600" step="5" inputmode="numeric" value="30" />
          </label>
          <div class="quick-times" aria-label="Quick time settings">
            <button class="secondary selected" type="button" data-seconds="30">30s</button>
            <button class="secondary" type="button" data-seconds="45">45s</button>
            <button class="secondary" type="button" data-seconds="60">60s</button>
            <button class="secondary" type="button" data-seconds="90">90s</button>
          </div>
          <div class="stats">
            <div class="stat">
              <span>Questions</span>
              <strong>18</strong>
            </div>
            <div class="stat">
              <span>Mode</span>
              <strong>Random</strong>
            </div>
            <div class="stat">
              <span>Flow</span>
              <strong>Manual</strong>
            </div>
          </div>
          <button id="enter" type="button">Start Practice</button>
        </div>
      </section>

      <section class="screen practice" id="practiceScreen">
        <header>
          <div class="brand">
            <div class="mark" aria-hidden="true">q</div>
            <h2>qqq</h2>
          </div>
          <div class="count" id="count">1 / 18</div>
        </header>

        <main>
          <section class="question-panel" aria-live="polite">
            <div class="question-meta">
              <p class="label">Random question</p>
              <p class="pill" id="durationPill">30s</p>
            </div>
            <p class="question" id="question"></p>
          </section>

          <section class="timer-panel">
            <div class="timer-top">
              <div class="time" id="time">00:30</div>
              <div class="status" id="status">Running</div>
            </div>
            <div class="progress" aria-hidden="true">
              <div class="bar" id="bar"></div>
            </div>
            <div class="controls">
              <button id="next" type="button">Next</button>
              <button id="home" type="button" class="secondary">Home</button>
            </div>
          </section>
        </main>

        <footer>
          <span>The question stays on screen when time ends.</span>
          <span id="round">Round 1</span>
        </footer>
      </section>
    </div>

    <script>
      const questions = [
        "What is the difference between a schedule and an appointment?",
        "How would you use a schedule in your future job as a flight attendant?",
        "What does a flight attendant do, and where do they work?",
        "What does a check-in agent do, and where do they work?",
        "What is the perfect job? Describe it.",
        "Which airline or travel job do you think is interesting? Why?",
        "Which airline or travel job do you think is boring? Why?",
        "Which airline or travel job do you think is dangerous? Why?",
        "Which airline or travel job do you think is exciting? Why?",
        "Where do people usually go for fun? What do they do, and have you tried it?",
        "When was your best vacation, and where did you go?",
        "What is your favorite festival or celebration? Why?",
        "Name an international festival that you think is great and tell us why.",
        "When was the last time you went somewhere? Who did you go with, and what were you wearing?",
        "What is your favorite item of clothing (or accessory)? Explain why.",
        "Who do you think is fashionable? Why?",
        "Where is the best place to buy clothes? Why?",
        "Think about your favorite airline. What do you think of the uniform? Is it practical or trendy?"
      ];

      const homeScreen = document.querySelector("#homeScreen");
      const practiceScreen = document.querySelector("#practiceScreen");
      const questionEl = document.querySelector("#question");
      const countEl = document.querySelector("#count");
      const roundEl = document.querySelector("#round");
      const timeEl = document.querySelector("#time");
      const statusEl = document.querySelector("#status");
      const barEl = document.querySelector("#bar");
      const secondsInput = document.querySelector("#seconds");
      const durationPill = document.querySelector("#durationPill");
      const enterButton = document.querySelector("#enter");
      const nextButton = document.querySelector("#next");
      const homeButton = document.querySelector("#home");
      const quickButtons = [...document.querySelectorAll("[data-seconds]")];

      let order = shuffle([...questions.keys()]);
      let orderIndex = 0;
      let round = 1;
      let duration = 30;
      let remaining = duration;
      let timerId = null;
      let hasAlerted = false;

      function shuffle(items) {
        for (let i = items.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
        return items;
      }

      function clampDuration(value) {
        const parsed = Number.parseInt(value, 10);
        return Number.isFinite(parsed) ? Math.min(600, Math.max(5, parsed)) : 30;
      }

      function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function setScreen(screen) {
        homeScreen.classList.toggle("active", screen === "home");
        practiceScreen.classList.toggle("active", screen === "practice");
      }

      function showQuestion() {
        if (orderIndex >= order.length) {
          order = shuffle([...questions.keys()]);
          orderIndex = 0;
          round += 1;
        }

        const questionIndex = order[orderIndex];
        questionEl.textContent = questions[questionIndex];
        countEl.textContent = `${orderIndex + 1} / ${questions.length}`;
        roundEl.textContent = `Round ${round}`;
      }

      function renderTimer() {
        timeEl.textContent = formatTime(remaining);
        durationPill.textContent = `${duration}s`;

        const elapsed = duration - remaining;
        const progress = Math.min(100, Math.max(0, (elapsed / duration) * 100));
        barEl.style.width = `${progress}%`;

        if (remaining === 0) {
          statusEl.textContent = "Time passed";
          statusEl.classList.add("done");
        } else {
          statusEl.textContent = "Running";
          statusEl.classList.remove("done");
        }
      }

      function stopTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function startTimer() {
        stopTimer();
        hasAlerted = false;
        timerId = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          renderTimer();

          if (remaining === 0) {
            stopTimer();
            if (!hasAlerted && "vibrate" in navigator) {
              navigator.vibrate([180, 90, 180]);
            }
            hasAlerted = true;
          }
        }, 1000);
      }

      function resetAndRunTimer() {
        remaining = duration;
        renderTimer();
        startTimer();
      }

      function beginPractice() {
        duration = clampDuration(secondsInput.value);
        secondsInput.value = String(duration);
        order = shuffle([...questions.keys()]);
        orderIndex = 0;
        round = 1;
        setScreen("practice");
        showQuestion();
        resetAndRunTimer();
      }

      quickButtons.forEach((button) => {
        button.addEventListener("click", () => {
          secondsInput.value = button.dataset.seconds;
          quickButtons.forEach((item) => item.classList.remove("selected"));
          button.classList.add("selected");
        });
      });

      secondsInput.addEventListener("input", () => {
        quickButtons.forEach((button) => {
          button.classList.toggle("selected", button.dataset.seconds === secondsInput.value);
        });
      });

      enterButton.addEventListener("click", beginPractice);
      nextButton.addEventListener("click", () => {
        orderIndex += 1;
        showQuestion();
        resetAndRunTimer();
      });
      homeButton.addEventListener("click", () => {
        stopTimer();
        setScreen("home");
      });
    </script>
  </body>
</html>
