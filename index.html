<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sorin Q" />
    <meta name="description" content="Random flight attendant interview question timer." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>Sorin Q</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #111;
        --panel-2: #181818;
        --text: #f6f6f6;
        --muted: #a8a8a8;
        --line: #2a2a2a;
        --strong: #fff;
        --danger: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100svh;
        padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(100%, 560px);
        min-height: calc(100svh - 36px);
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 34px;
        height: 34px;
        border: 1px solid var(--strong);
        display: grid;
        place-items: center;
        font-weight: 800;
        flex: 0 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 750;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      main {
        display: grid;
        align-content: center;
        gap: 18px;
      }

      .question-panel {
        min-height: 310px;
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 24px;
        display: grid;
        align-content: space-between;
        gap: 26px;
      }

      .question-label {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .question {
        margin: 0;
        font-size: clamp(28px, 9vw, 44px);
        line-height: 1.05;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .timer-panel {
        border: 1px solid var(--line);
        background: var(--panel-2);
        padding: 18px;
        display: grid;
        gap: 16px;
      }

      .timer-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .time {
        font-variant-numeric: tabular-nums;
        font-size: 42px;
        line-height: 1;
        font-weight: 800;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .status.done {
        color: var(--danger);
        font-weight: 700;
      }

      .progress {
        height: 8px;
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .bar {
        width: 0%;
        height: 100%;
        background: var(--strong);
        transition: width 180ms linear;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .settings {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: #050505;
        color: var(--text);
        padding: 0 12px;
        font-size: 18px;
        font-weight: 700;
      }

      button {
        min-height: 48px;
        border: 1px solid var(--strong);
        border-radius: 0;
        background: var(--strong);
        color: #050505;
        font-weight: 800;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      button.secondary {
        background: transparent;
        color: var(--strong);
      }

      button:active {
        transform: translateY(1px);
      }

      footer {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        text-align: center;
      }

      @media (max-width: 380px) {
        .question-panel {
          padding: 20px;
        }

        .question {
          font-size: 27px;
        }

        .time {
          font-size: 36px;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">
          <div class="mark" aria-hidden="true">Q</div>
          <h1>Sorin Q</h1>
        </div>
        <div class="count" id="count">1 / 18</div>
      </header>

      <main>
        <section class="question-panel" aria-live="polite">
          <p class="question-label">Random question</p>
          <p class="question" id="question"></p>
        </section>

        <section class="timer-panel">
          <div class="timer-top">
            <div class="time" id="time">00:30</div>
            <div class="status" id="status">Ready</div>
          </div>
          <div class="progress" aria-hidden="true">
            <div class="bar" id="bar"></div>
          </div>
          <div class="settings">
            <label>
              Seconds per question
              <input id="seconds" type="number" min="5" max="600" step="5" inputmode="numeric" value="30" />
            </label>
            <button id="apply" type="button" class="secondary">Set</button>
          </div>
          <div class="controls">
            <button id="start" type="button">Start</button>
            <button id="reset" type="button" class="secondary">Reset</button>
            <button id="next" type="button" class="secondary">Next</button>
          </div>
        </section>
      </main>

      <footer>Time ending only marks the question as over. It will not change automatically.</footer>
    </div>

    <script>
      const questions = [
        "What is the difference between a schedule and an appointment?",
        "How would you use a schedule in your future job as a flight attendant?",
        "What does a flight attendant do, and where do they work?",
        "What does a check-in agent do, and where do they work?",
        "What is the perfect job? Describe it.",
        "Which airline or travel job do you think is interesting? Why?",
        "Which airline or travel job do you think is boring? Why?",
        "Which airline or travel job do you think is dangerous? Why?",
        "Which airline or travel job do you think is exciting? Why?",
        "Where do people usually go for fun? What do they do, and have you tried it?",
        "When was your best vacation, and where did you go?",
        "What is your favorite festival or celebration? Why?",
        "Name an international festival that you think is great and tell us why.",
        "When was the last time you went somewhere? Who did you go with, and what were you wearing?",
        "What is your favorite item of clothing (or accessory)? Explain why.",
        "Who do you think is fashionable? Why?",
        "Where is the best place to buy clothes? Why?",
        "Think about your favorite airline. What do you think of the uniform? Is it practical or trendy?"
      ];

      const questionEl = document.querySelector("#question");
      const countEl = document.querySelector("#count");
      const timeEl = document.querySelector("#time");
      const statusEl = document.querySelector("#status");
      const barEl = document.querySelector("#bar");
      const secondsInput = document.querySelector("#seconds");
      const applyButton = document.querySelector("#apply");
      const startButton = document.querySelector("#start");
      const resetButton = document.querySelector("#reset");
      const nextButton = document.querySelector("#next");

      let order = shuffle([...questions.keys()]);
      let orderIndex = 0;
      let duration = 30;
      let remaining = duration;
      let timerId = null;
      let hasAlerted = false;

      function shuffle(items) {
        for (let i = items.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
        return items;
      }

      function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function renderTimer() {
        timeEl.textContent = formatTime(remaining);
        const elapsed = duration - remaining;
        const progress = duration === 0 ? 100 : Math.min(100, Math.max(0, (elapsed / duration) * 100));
        barEl.style.width = `${progress}%`;

        if (remaining === 0) {
          statusEl.textContent = `${duration} seconds passed`;
          statusEl.classList.add("done");
        } else if (timerId) {
          statusEl.textContent = "Running";
          statusEl.classList.remove("done");
        } else {
          statusEl.textContent = "Ready";
          statusEl.classList.remove("done");
        }
      }

      function showQuestion() {
        if (orderIndex >= order.length) {
          order = shuffle([...questions.keys()]);
          orderIndex = 0;
        }

        const questionIndex = order[orderIndex];
        questionEl.textContent = questions[questionIndex];
        countEl.textContent = `${orderIndex + 1} / ${questions.length}`;
      }

      function stopTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function startTimer() {
        if (timerId || remaining === 0) return;
        renderTimer();
        timerId = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          renderTimer();

          if (remaining === 0) {
            stopTimer();
            if (!hasAlerted && "vibrate" in navigator) {
              navigator.vibrate([180, 90, 180]);
            }
            hasAlerted = true;
          }
        }, 1000);
      }

      function resetTimer() {
        stopTimer();
        remaining = duration;
        hasAlerted = false;
        renderTimer();
      }

      function applyDuration() {
        const nextDuration = Number.parseInt(secondsInput.value, 10);
        duration = Number.isFinite(nextDuration) ? Math.min(600, Math.max(5, nextDuration)) : 30;
        secondsInput.value = String(duration);
        resetTimer();
      }

      startButton.addEventListener("click", startTimer);
      resetButton.addEventListener("click", resetTimer);
      applyButton.addEventListener("click", applyDuration);
      secondsInput.addEventListener("change", applyDuration);
      nextButton.addEventListener("click", () => {
        orderIndex += 1;
        showQuestion();
        resetTimer();
      });

      showQuestion();
      renderTimer();
    </script>
  </body>
</html>
